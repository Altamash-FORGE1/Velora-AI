services:
  db:
    image: postgres:15-alpine
    container_name: velora_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: velora_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: velora_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/velora_ai
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: velora_frontend
    environment:
      - VITE_BACKEND_URL=${VITE_BACKEND_URL}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
      - VITE_GOOGLE_MAPS_JS_API_KEY=${GOOGLE_MAPS_API_KEY}
    ports:
      - "5175:5175"
    volumes:
      - .:/app
      - /app/node_modules
volumes:
  postgres_data: